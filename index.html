<head>
<meta charset="UTF-8">

<title>JURNAL UMT</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#020617;
  position:relative;
}

/* GOLD RAIN BACKGROUND */

.rain{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
}

.rain span{
  position:absolute;
  top:-150px;
  width:2px;
  height:140px;

  background:linear-gradient(
    to bottom,
    rgba(250,204,21,0),
    #facc15,
    rgba(250,204,21,0)
  );

  box-shadow:0 0 15px #facc15;
  animation:goldRain linear infinite;
}

/* POSISI */

.rain span:nth-child(1){
  left:5%;
  animation-duration:3s;
}

.rain span:nth-child(2){
  left:15%;
  animation-duration:4s;
}

.rain span:nth-child(3){
  left:25%;
  animation-duration:2.5s;
}

.rain span:nth-child(4){
  left:35%;
  animation-duration:5s;
}

.rain span:nth-child(5){
  left:45%;
  animation-duration:3.5s;
}

.rain span:nth-child(6){
  left:55%;
  animation-duration:4.5s;
}

.rain span:nth-child(7){
  left:65%;
  animation-duration:2.8s;
}

.rain span:nth-child(8){
  left:75%;
  animation-duration:3.8s;
}

.rain span:nth-child(9){
  left:85%;
  animation-duration:5s;
}

.rain span:nth-child(10){
  left:95%;
  animation-duration:3s;
}

@keyframes goldRain{

  0%{
    transform:translateY(-200px);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:translateY(120vh);
    opacity:0;
  }

}

/* CARD */

.card{
  position:relative;
  z-index:10;
  width:360px;
  padding:35px 25px;
  border-radius:25px;
  text-align:center;
  overflow:hidden;

  background:rgba(15,23,42,0.78);
  backdrop-filter:blur(14px);

  box-shadow:
  0 0 20px rgba(250,204,21,0.2),
  0 0 40px rgba(250,204,21,0.1);
}

/* BORDER NEON BERJALAN */

.card::before{
  content:'';
  position:absolute;
  inset:-2px;
  border-radius:25px;

  background:linear-gradient(
    90deg,
    transparent,
    #facc15,
    #fff7cc,
    #facc15,
    transparent
  );

  background-size:300% 300%;
  animation:neonRun 5s linear infinite;

  z-index:-2;
}

/* DALAM CARD */

.card::after{
  content:'';
  position:absolute;
  inset:2px;
  border-radius:23px;

  background:rgba(15,23,42,0.96);

  z-index:-1;
}

@keyframes neonRun{

  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:300% 50%;
  }

}

/* FOTO */

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid #facc15;
  object-fit:cover;
  margin-bottom:15px;

  animation:glow 2s infinite alternate;
}

@keyframes glow{

  from{
    box-shadow:0 0 10px #facc15;
  }

  to{
    box-shadow:0 0 35px #facc15;
  }

}

h1{
  color:#fff;
  margin-bottom:8px;
  letter-spacing:2px;
}

p{
  color:#cbd5e1;
  margin-bottom:25px;
  font-size:14px;
}

/* BUTTON */

.btn{
  display:block;
  width:100%;
  padding:15px;
  margin:12px 0;
  border-radius:14px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  transition:0.3s;
  font-size:16px;
}

.btn:hover{
  transform:scale(1.05);
}

.ig{
  background:linear-gradient(
    45deg,
    #833ab4,
    #fd1d1d,
    #fcb045
  );
}

.wa{
  background:#22c55e;
}

.tt{
  background:black;
  border:1px solid white;
}

.footer{
  margin-top:20px;
  color:#94a3b8;
  font-size:12px;
}

</style>
