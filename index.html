body{

/* =========================
   PREMIUM GOLD RAIN
========================= */

.rain{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
}

.rain span{
  position:absolute;
  top:-120px;
  width:2px;
  height:120px;

  background:linear-gradient(
    to bottom,
    transparent,
    #facc15,
    transparent
  );

  opacity:0.7;

  animation:rain linear infinite;
}

/* POSISI */

.rain span:nth-child(1){
  left:10%;
  animation-duration:3s;
}

.rain span:nth-child(2){
  left:30%;
  animation-duration:4s;
}

.rain span:nth-child(3){
  left:50%;
  animation-duration:2.8s;
}

.rain span:nth-child(4){
  left:70%;
  animation-duration:4.5s;
}

.rain span:nth-child(5){
  left:90%;
  animation-duration:3.5s;
}

@keyframes rain{

  from{
    transform:translateY(-200px);
  }

  to{
    transform:translateY(120vh);
  }

}

/* =========================
   CARD
========================= */

.card{
  position:relative;

  z-index:10;

  width:350px;

  padding:35px 25px;

  border-radius:24px;

  text-align:center;

  background:rgba(0, 76, 255, 0.88);

  border:1px solid rgba(250,204,21,0.25);

  backdrop-filter:blur(5px);

  overflow:hidden;

  box-shadow:
  0 0 15px rgba(250,204,21,0.15);
}

/* =========================
   BORDER NEON PREMIUM
========================= */

.card::before{
  content:'';

  position:absolute;
  inset:0;

  border-radius:24px;

  padding:1.5px;

  background:linear-gradient(
    90deg,
    #facc15,
    #fff7cc,
    #facc15
  );

  background-size:200% 200%;

  animation:borderMove 3s linear infinite;

  /* FIX BUTTON */
  pointer-events:none;

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;

  mask-composite:exclude;
}

@keyframes borderMove{

  0%{
    background-position:0% 50%;
  }

  100%{
    background-position:200% 50%;
  }

}

/* =========================
   PROFILE
========================= */

.profile{
  width:110px;
  height:110px;

  border-radius:50%;

  border:3px solid #facc15;

  object-fit:cover;

  margin-bottom:15px;

  0 0 15px rgba(250,204,21,0.5);
}
