<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Social Link</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:#020617;
  position:relative;
}

/* BACKGROUND ANIMATION */

.circles{
  position:absolute;
  width:100%;
  height:100%;
  overflow:hidden;
}

.circles span{
  position:absolute;
  display:block;
  border-radius:50%;
  background:rgba(250,204,21,0.15);
  animation:animate 20s linear infinite;
  bottom:-150px;
}

.circles span:nth-child(1){
  left:10%;
  width:80px;
  height:80px;
  animation-delay:0s;
}

.circles span:nth-child(2){
  left:25%;
  width:120px;
  height:120px;
  animation-delay:2s;
  animation-duration:12s;
}

.circles span:nth-child(3){
  left:40%;
  width:60px;
  height:60px;
  animation-delay:4s;
}

.circles span:nth-child(4){
  left:60%;
  width:150px;
  height:150px;
  animation-delay:0s;
  animation-duration:18s;
}

.circles span:nth-child(5){
  left:75%;
  width:90px;
  height:90px;
  animation-delay:3s;
}

.circles span:nth-child(6){
  left:90%;
  width:110px;
  height:110px;
  animation-delay:5s;
}

@keyframes animate{
  0%{
    transform:translateY(0) rotate(0deg);
    opacity:1;
  }

  100%{
    transform:translateY(-1200px) rotate(720deg);
    opacity:0;
  }
}

/* CARD */

.card{
  position:relative;
  z-index:10;
  width:360px;
  background:rgba(15,23,42,0.75);
  border:1px solid rgba(255,255,255,0.1);
  backdrop-filter:blur(12px);
  padding:35px 25px;
  border-radius:25px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid #facc15;
  object-fit:cover;
  margin-bottom:15px;
  animation:glow 2s infinite alternate;
}

@keyframes glow{
  from{
    box-shadow:0 0 10px #facc15;
  }

  to{
    box-shadow:0 0 30px #facc15;
  }
}

h1{
  color:white;
  margin-bottom:8px;
}

p{
  color:#cbd5e1;
  margin-bottom:25px;
  font-size:14px;
}

.btn{
  display:block;
  width:100%;
  padding:15px;
  margin:12px 0;
  border-radius:14px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  transition:0.3s;
  font-size:16px;
}

.btn:hover{
  transform:scale(1.05);
}

.ig{
  background:linear-gradient(45deg,#833ab4,#fd1d1d,#fcb045);
}

.wa{
  background:#22c55e;
}

.tt{
  background:black;
  border:1px solid white;
}

.footer{
  margin-top:20px;
  color:#94a3b8;
  font-size:12px;
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="circles">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<!-- CARD -->
<div class="card">

  <!-- FOTO -->
  <img src="profile.jpg" class="profile">

  <h1>JURNAL UMT</h1>

  <p>
    Welcome to my social media 🚀
  </p>

  <!-- GANTI LINK -->
  <a href="https://www.instagram.com/jurnalumt/" class="btn ig" target="_blank">
    Instagram
  </a>

  <a href="https://wa.me/6281584913830" class="btn wa" target="_blank">
    WhatsApp
  </a>

  <a href="https://www.tiktok.com/@jurnalumt" class="btn tt" target="_blank">
    TikTok
  </a>

  <div class="footer">
    
  </div>

</div>

</body>
</html>
